security:
    password_hashers:
        App\Module\Identity\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Module\Identity\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\MaintenanceUserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_portal_entry
                enable_csrf: true
            logout:
                path: app_logout

    access_control:
        - { path: ^/portal/admin, roles: ROLE_ADMIN }
        - { path: ^/portal/technician, roles: ROLE_TECHNICIAN }
        - { path: ^/portal/customer, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
